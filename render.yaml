services:
  - type: web
    name: se7enfit-super-admin-station
    env: node
    plan: free
    region: oregon
    branch: main
    buildCommand: bun install && bun run build
    startCommand: node .output/server/index.mjs
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: VITE_API_BASE_URL
        value: https://se7en-fit-api.onrender.com/api
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
